name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://metricsdock:metricsdock@localhost:5432/metricsdock
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-secret-at-least-32-characters
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      VALKEY_URL: redis://localhost:6379
      CRON_SECRET: ci-only-cron-secret
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm check:generated
      - run: pnpm build
